name: BitTime
options:
  bundleIdPrefix: app.bittime.BitTime
  deploymentTarget:
    macOS: "13.5"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Release
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.5"
    MARKETING_VERSION: "1.1.1"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
  configs:
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      VALIDATE_PRODUCT: YES

configs:
  Debug: debug
  Release: release

targets:
  BitTimeCore:
    type: framework
    platform: macOS
    deploymentTarget: "13.5"
    sources:
      - path: BitTimeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.bittime.BitTime.core
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        CODE_SIGN_IDENTITY: ""
        GENERATE_INFOPLIST_FILE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
          - "@loader_path/Frameworks"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""

  BitTime:
    type: application
    platform: macOS
    deploymentTarget: "13.5"
    sources:
      - path: BitTime
    dependencies:
      - target: BitTimeCore
        embed: true
        codeSign: true
      - target: BitTimeWidget
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.bittime.BitTime
        PRODUCT_NAME: BitTime
        ASSETCATALOG_COMPILER_APPICON_NAME: BitTime
        INFOPLIST_FILE: BitTime/Info.plist
        CODE_SIGN_ENTITLEMENTS: BitTime/BitTime.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES

  BitTimeWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: BitTimeWidget
    dependencies:
      - target: BitTimeCore
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.bittime.BitTime.BitTimeWidget
        PRODUCT_NAME: BitTimeWidget
        INFOPLIST_FILE: BitTimeWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: BitTimeWidget/BitTimeWidget.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        SKIP_INSTALL: YES
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../../../../Frameworks"
          - "@executable_path/../../../Frameworks"

  BitTimeTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.5"
    sources:
      - path: BitTimeTests
    dependencies:
      - target: BitTime
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.bittime.BitTime.BitTimeTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BitTime.app/Contents/MacOS/BitTime"

schemes:
  BitTime:
    build:
      targets:
        BitTime: all
        BitTimeWidget: all
        BitTimeCore: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BitTimeTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
