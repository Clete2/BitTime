name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Build & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # Xcode 26+ is required for Icon Composer .icon support.
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild \
            -scheme BitTime \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | xcbeautify
        env:
          NSUnbufferedIO: YES
