name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Build, Test & Release
    runs-on: macos-15
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required so semantic-release can analyze commits
          # and so its git plugin can push the changelog commit.
          fetch-depth: 0
          persist-credentials: true

      - name: Select Xcode
        # Xcode 26+ is required to compile Icon Composer .icon bundles
        # (BitTime.icon) into the app's compiled assets and to inject
        # CFBundleIconName into Info.plist. Xcode 16.x silently copies
        # the .icon directory into Resources without registering it as
        # the app icon, which is why v1.0.2 shipped without an icon.
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -scheme BitTime \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test | xcbeautify
        env:
          NSUnbufferedIO: YES

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install semantic-release
        run: npm ci || npm install

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: npx semantic-release
